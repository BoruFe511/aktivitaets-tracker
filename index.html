<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aktivität" />
  <title>Aktivitäts-Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #eeeaf8;
      --text2: rgba(238,234,248,0.5);
      --text3: rgba(238,234,248,0.28);

      --c-studium:  #0D1F2D;
      --c-ehrenamt: #4A90E2;
      --c-sport:    #E6CCB2;
      --c-haushalt: #F4A261;

      --box-studium:  #1a3a54;
      --box-ehrenamt: #4A90E2;
      --box-sport:    #c9a882;
      --box-haushalt: #F4A261;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    /* ── Pages ── */
    .page { display: none; max-width: 680px; margin: 0 auto; padding: 0 0 5rem; }
    .page.active { display: block; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1rem 1rem;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
      border-bottom: 0.5px solid var(--border);
    }
    .header-left { display: flex; flex-direction: column; gap: 1px; }
    .logo { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
    .today-label { font-size: 15px; font-weight: 500; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* Sync dot */
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
    .sync-dot.syncing { background: #fb923c; animation: pulse 0.8s infinite; }
    .sync-dot.ok { background: #34d399; }
    .sync-dot.err { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Burger */
    .burger { background: none; border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text2); width: 36px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; padding: 0; transition: background 0.15s; }
    .burger:hover { background: var(--surface2); }
    .burger span { display: block; width: 16px; height: 1.5px; background: currentColor; border-radius: 2px; }

    /* ── Drawer menu ── */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: var(--surface); border-left: 0.5px solid var(--border2); z-index: 101; transition: right 0.25s cubic-bezier(.4,0,.2,1); padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 4px; }
    .drawer.open { right: 0; }
    .drawer-title { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
    .drawer-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text2); transition: background 0.12s, color 0.12s; border: none; background: none; width: 100%; text-align: left; }
    .drawer-item:hover { background: var(--surface2); color: var(--text); }
    .drawer-item.active-page { color: var(--text); background: var(--surface2); }
    .drawer-item .di-icon { font-size: 16px; width: 20px; text-align: center; }

    /* ── Daily totals bar ── */
    .daily-total { padding: 1rem 1rem 0.75rem; display: flex; align-items: baseline; gap: 8px; }
    .daily-total-label { font-size: 13px; color: var(--text2); }
    .daily-total-val { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }

    /* ── Category grid ── */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; padding: 0 1rem; gap: 8px; }

    .cat-col { display: flex; flex-direction: column; gap: 0; }

    .cat-header {
      border-radius: 8px 8px 0 0;
      padding: 8px 6px 6px;
      text-align: center;
      margin-bottom: 0;
    }
    .cat-name { font-size: 11px; font-weight: 500; letter-spacing: 0.03em; line-height: 1.2; }
    .cat-time { font-size: 10px; margin-top: 3px; opacity: 0.8; font-family: 'DM Mono', monospace; }

    /* Box grid: 3 columns per category */
    .box-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 5px;
    }

    .box {
      aspect-ratio: 1;
      border-radius: 3px;
      border: 0.5px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      transition: background 0.08s, border-color 0.08s, transform 0.07s;
    }
    .box:active { transform: scale(0.84); }

    .sync-bar { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: auto; white-space: nowrap; }

    /* ── OLD weekly view (page-alt) ── */
    .page-alt-inner { padding: 1rem; }
    .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .nav-btn { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text2); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background 0.15s; }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .week-str { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; min-width: 130px; text-align: center; }
    .summary-old { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .sum-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 10px 8px; }
    .sum-dot { width: 6px; height: 6px; border-radius: 50%; margin-bottom: 6px; }
    .sum-val { font-size: 20px; font-family: 'DM Mono', monospace; font-weight: 500; line-height: 1; }
    .sum-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
    .days-grid-old { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 1rem; }
    .day-col-old { display: flex; flex-direction: column; gap: 3px; }
    .day-hdr-old { text-align: center; font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; padding-bottom: 3px; }
    .day-hdr-old.today { color: var(--text); }
    .day-date-old { font-size: 9px; color: var(--text3); display: block; }
    .cat-section-old { display: flex; flex-direction: column; gap: 2px; }
    .box-old { width: 16px; height: 16px; border-radius: 3px; border: 0.5px solid var(--border2); background: var(--surface); cursor: pointer; transition: background 0.1s, transform 0.07s; flex-shrink: 0; }
    .box-old:active { transform: scale(0.85); }
    .cat-div-old { height: 3px; }
    .total-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .total-lbl { font-size: 12px; color: var(--text2); }
    .total-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
    .day-col-old.today { background: rgba(255,255,255,0.03); border-radius: 6px; }
    .legend-old { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .leg-dot { width: 7px; height: 7px; border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ PAGE: TODAY ══ -->
<div class="page active" id="page-today">
  <div class="header">
    <div class="header-left">
      <span class="logo">Aktivität</span>
      <span class="today-label" id="today-label"></span>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="burger" id="burger-btn" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="daily-total">
    <span class="daily-total-label">Tagesaktivität</span>
    <span class="daily-total-val" id="daily-total-val">0h 0min</span>
    <span class="sync-bar" id="sync-bar"></span>
  </div>

  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- ══ PAGE: ALT (Wochenansicht) ══ -->
<div class="page" id="page-alt">
  <div class="header">
    <div class="header-left">
      <span class="logo">Aktivität</span>
      <span class="today-label">Wochenansicht</span>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot-alt"></div>
      <button class="burger" id="burger-btn-alt" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="page-alt-inner">
    <div class="week-nav">
      <button class="nav-btn" id="prev">&#8592;</button>
      <div class="week-str" id="week-str"></div>
      <button class="nav-btn" id="next">&#8594;</button>
    </div>
    <div class="summary-old" id="summary-old"></div>
    <div class="legend-old">
      <div class="leg-item"><div class="leg-dot" style="background:#4A90E2"></div>Studium</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4A90E2"></div>Ehrenamt</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c9a882"></div>Sport</div>
      <div class="leg-item"><div class="leg-dot" style="background:#F4A261"></div>Haushalt</div>
    </div>
    <div class="days-grid-old" id="days-grid-old"></div>
    <div class="total-bar">
      <span class="total-lbl">Woche gesamt</span>
      <span class="total-val" id="total-val-old"></span>
    </div>
  </div>
</div>

<!-- ══ Drawer ══ -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">Navigation</div>
  <button class="drawer-item active-page" data-page="page-today">
    <span class="di-icon">☀</span> Heute
  </button>
  <button class="drawer-item" data-page="page-alt">
    <span class="di-icon">📅</span> Wochenansicht (alt)
  </button>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CATS = [
  { key: 'studium',  label: 'Studium',  color: '#0e1e3a', boxColor: '#2080e0',  textColor: '#60b4ff' },
  { key: 'ehrenamt', label: 'Ehrenamt', color: '#0e3028', boxColor: '#18b870',  textColor: '#40e8a0' },
  { key: 'sport',    label: 'Sport',    color: '#2e2808', boxColor: '#d4b000',  textColor: '#ffe040' },
  { key: 'haushalt', label: 'Haushalt', color: '#301808', boxColor: '#e05810',  textColor: '#ff8844' },
];
const DAYS_SHORT = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const MAX_BOXES  = 20 * 3; // 20 rows × 3 cols = 60 boxes per category
const MAX_BOXES_OLD = 12;
const LS_KEY = 'aktivitaets_tracker_v1';
const GH_OWNER = 'BoruFe511';
const GH_REPO  = 'aktivitaets-tracker';
const GH_FILE  = 'data.json';
const GH_TOKEN_KEY = 'gh_pat';

let state = {};
let weekStart = getMonday(new Date());
let syncTimer = null;
let ghSha = null;
let currentPage = 'page-today';

// ── Helpers ───────────────────────────────────────────────────────────────────
function getMonday(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() - day + 1);
  return dt;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function todayStr() { return fmtDate(new Date()); }
function fmtWeek(mon) {
  const sun = addDays(mon, 6);
  const f = dt => `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}`;
  return `${f(mon)} – ${f(sun)}`;
}
function minsToStr(m) { return `${Math.floor(m/60)}h ${m%60}min`; }

function fmtTodayLabel() {
  return new Date().toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
}

// ── Storage ───────────────────────────────────────────────────────────────────
function localLoad() { try { const d = localStorage.getItem(LS_KEY); if (d) state = JSON.parse(d); } catch(e){} }
function localSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){} }
function getToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function saveToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }
function getCount(cat, date) { return state[`${cat}__${date}`] || 0; }
function setCount(cat, date, n) { state[`${cat}__${date}`] = n; localSave(); scheduleSyncUp(); }

// ── Sync UI ───────────────────────────────────────────────────────────────────
function setSyncStatus(status, msg) {
  ['sync-dot','sync-dot-alt'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'sync-dot ' + (status||'');
  });
  const bar = document.getElementById('sync-bar');
  if (bar) bar.textContent = msg || '';
}

// ── GitHub ────────────────────────────────────────────────────────────────────
const API = `https://gh-proxy.felix-poit.workers.dev/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

async function ghGet() {
  const token = getToken(); if (!token) return null;
  const r = await fetch(API, { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } });
  if (r.status === 404) return { notFound: true };
  if (!r.ok) throw new Error(`GitHub GET ${r.status}`);
  const json = await r.json();
  ghSha = json.sha;
  return JSON.parse(atob(json.content.replace(/\n/g,'')));
}
async function ghPut(data) {
  const token = getToken(); if (!token) return;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: 'update tracker data', content };
  if (ghSha) body.sha = ghSha;
  const r = await fetch(API, { method: 'PUT', headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) { const err = await r.json().catch(()=>({})); throw new Error(err.message || `GitHub PUT ${r.status}`); }
  const json = await r.json();
  ghSha = json.content.sha;
}

async function syncDown() {
  if (!getToken()) return;
  setSyncStatus('syncing', 'Lade Daten …');
  try {
    const remote = await ghGet();
    if (remote && !remote.notFound) { state = remote; localSave(); renderToday(); renderAlt(); }
    setSyncStatus('ok', 'Synchronisiert ' + new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) { setSyncStatus('err', 'Sync fehlgeschlagen: ' + e.message); }
}

function scheduleSyncUp() {
  clearTimeout(syncTimer);
  setSyncStatus('syncing', 'Speichere …');
  syncTimer = setTimeout(async () => {
    try {
      if (!ghSha) await ghGet();
      await ghPut(state);
      setSyncStatus('ok', 'Gespeichert ' + new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
    } catch(e) {
      if (e.message.includes('conflict') || e.message.includes('422')) {
        try { const remote = await ghGet(); if (remote && !remote.notFound) state = Object.assign({}, remote, state); await ghPut(state); setSyncStatus('ok', 'Gespeichert'); }
        catch(e2) { setSyncStatus('err', 'Fehler: ' + e2.message); }
      } else { setSyncStatus('err', 'Fehler: ' + e.message); }
    }
  }, 1200);
}

// ── Render TODAY ──────────────────────────────────────────────────────────────
function renderToday() {
  const today = todayStr();
  document.getElementById('today-label').textContent = fmtTodayLabel();

  let totalMins = 0;
  CATS.forEach(c => { totalMins += getCount(c.key, today) * 10; });
  document.getElementById('daily-total-val').textContent = minsToStr(totalMins);

  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATS.map(c => {
    const count = getCount(c.key, today);
    const mins = count * 10;

    let boxes = '';
    for (let b = 0; b < MAX_BOXES; b++) {
      const filled = b < count;
      boxes += `<div class="box" data-cat="${c.key}" data-date="${today}" data-idx="${b}"
        style="${filled ? 'background:'+c.boxColor+';border-color:'+c.boxColor+'88' : ''}"></div>`;
    }

    return `<div class="cat-col">
      <div class="cat-header" style="background:${c.color}">
        <div class="cat-name" style="color:${c.textColor}">${c.label}</div>
        <div class="cat-time" style="color:${c.textColor}">${minsToStr(mins)}</div>
      </div>
      <div class="box-grid">${boxes}</div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.box').forEach(box => {
    box.addEventListener('click', () => {
      const {cat, date, idx} = box.dataset;
      const i = parseInt(idx);
      const cur = getCount(cat, date);
      setCount(cat, date, i === cur-1 ? cur-1 : i+1);
      renderToday();
    });
  });
}

// ── Render ALT (weekly) ───────────────────────────────────────────────────────
const CATS_OLD = [
  { key: 'studium',  label: 'Studium',  color: '#4A90E2' },
  { key: 'ehrenamt', label: 'Ehrenamt', color: '#4A90E2' },
  { key: 'sport',    label: 'Sport',    color: '#c9a882' },
  { key: 'haushalt', label: 'Haushalt', color: '#F4A261' },
];

function renderAlt() {
  const today = todayStr();
  const days = Array.from({length:7}, (_,i) => fmtDate(addDays(weekStart,i)));
  document.getElementById('week-str').textContent = fmtWeek(weekStart);

  let totalAll = 0;
  document.getElementById('summary-old').innerHTML = CATS_OLD.map(c => {
    const t = days.reduce((s,d) => s + getCount(c.key,d), 0);
    totalAll += t;
    return `<div class="sum-card">
      <div class="sum-dot" style="background:${c.color}"></div>
      <div class="sum-val" style="color:${c.color}">${t}</div>
      <div class="sum-lbl">${c.label}</div>
    </div>`;
  }).join('');

  const grid = document.getElementById('days-grid-old');
  grid.innerHTML = days.map((d, di) => {
    const isToday = d === today;
    const ddStr = d.slice(8)+'.'+d.slice(5,7);
    const catCols = CATS_OLD.map(c => {
      const count = getCount(c.key, d);
      let boxes = '';
      for (let b = 0; b < MAX_BOXES_OLD; b++) {
        const filled = b < count;
        boxes += `<div class="box-old" data-cat="${c.key}" data-date="${d}" data-idx="${b}"
          style="${filled ? 'background:'+c.color+';border-color:transparent' : ''}"></div>`;
      }
      return `<div class="cat-section-old">${boxes}</div>`;
    }).join('<div class="cat-div-old"></div>');

    return `<div class="day-col-old${isToday?' today':''}">
      <div class="day-hdr-old${isToday?' today':''}">
        ${DAYS_SHORT[di]}<span class="day-date-old">${ddStr}</span>
      </div>${catCols}
    </div>`;
  }).join('');

  document.getElementById('total-val-old').textContent = minsToStr(totalAll * 10);

  grid.querySelectorAll('.box-old').forEach(box => {
    box.addEventListener('click', () => {
      const {cat, date, idx} = box.dataset;
      const i = parseInt(idx);
      const cur = getCount(cat, date);
      setCount(cat, date, i === cur-1 ? cur-1 : i+1);
      renderAlt();
    });
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.drawer-item').forEach(btn => {
    btn.classList.toggle('active-page', btn.dataset.page === id);
  });
  currentPage = id;
  closeDrawer();
  if (id === 'page-alt') renderAlt();
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.getElementById('burger-btn').onclick = openDrawer;
document.getElementById('burger-btn-alt').onclick = openDrawer;
document.getElementById('drawer-overlay').onclick = closeDrawer;
document.querySelectorAll('.drawer-item').forEach(btn => {
  btn.onclick = () => showPage(btn.dataset.page);
});

document.getElementById('prev').onclick = () => { weekStart = addDays(weekStart,-7); renderAlt(); };
document.getElementById('next').onclick = () => { weekStart = addDays(weekStart,7); renderAlt(); };

// ── Token ─────────────────────────────────────────────────────────────────────
function checkToken() {
  if (!getToken()) {
    const t = prompt('GitHub Personal Access Token eingeben (wird nur lokal gespeichert):');
    if (t && t.trim()) saveToken(t.trim());
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
localLoad();
renderToday();
checkToken();
syncDown();

document.addEventListener('visibilitychange', () => { if (!document.hidden) syncDown(); });
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
