<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aktivität" />
  <title>Aktivitäts-Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0eefc;
      --text2: rgba(240,238,252,0.55);
      --text3: rgba(240,238,252,0.3);
      --studium:  #7f6ff5;
      --ehrenamt: #34d399;
      --sport:    #fb923c;
      --haushalt: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    .app { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .logo { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .week-nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text2); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background 0.15s, color 0.15s; }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .week-str { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; min-width: 130px; text-align: center; }

    /* Sync indicator */
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
    .sync-dot.syncing { background: #fb923c; animation: pulse 0.8s infinite; }
    .sync-dot.ok { background: #34d399; }
    .sync-dot.err { background: #f87171; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
    .sum-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 10px 8px; }
    .sum-dot { width: 6px; height: 6px; border-radius: 50%; margin-bottom: 6px; }
    .sum-val { font-size: 22px; font-family: 'DM Mono', monospace; font-weight: 500; line-height: 1; }
    .sum-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; text-transform: uppercase; }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1rem; }
    .day-col { display: flex; flex-direction: column; gap: 4px; }
    .day-hdr { text-align: center; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; padding-bottom: 4px; }
    .day-hdr.today { color: var(--text); }
    .day-date { font-size: 9px; color: var(--text3); display: block; }
    .day-hdr.today .day-date { color: var(--text2); }
    .cat-section { display: flex; flex-direction: column; gap: 2px; }
    .box {
      width: 18px; height: 18px; border-radius: 3px;
      border: 0.5px solid var(--border2);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.08s;
      flex-shrink: 0;
    }
    .box:active { transform: scale(0.88); }
    @media (max-width: 400px) { .box { width: 14px; height: 14px; } }
    .cat-divider { height: 4px; }

    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.25rem; }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; }

    .total-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .total-lbl { font-size: 12px; color: var(--text2); }
    .total-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
    .day-col.today { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 0 2px; margin: 0 -2px; }

    /* Sync status bar */
    .sync-bar { font-size: 11px; color: var(--text3); text-align: right; margin-top: 10px; font-family: 'DM Mono', monospace; min-height: 16px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Aktivität</div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot" title="Sync-Status"></div>
      <div class="week-nav">
        <button class="nav-btn" id="prev">&#8592;</button>
        <div class="week-str" id="week-str"></div>
        <button class="nav-btn" id="next">&#8594;</button>
      </div>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--studium)"></div>Studium</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--ehrenamt)"></div>Ehrenamt</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--sport)"></div>Sport</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--haushalt)"></div>Haushalt</div>
  </div>

  <div class="days-grid" id="days-grid"></div>

  <div class="total-bar">
    <span class="total-lbl">Woche gesamt</span>
    <span class="total-val" id="total-val"></span>
  </div>
  <div class="sync-bar" id="sync-bar"></div>
</div>

<script>
const CATS = [
  { key: 'studium',  label: 'Studium',  color: '#7f6ff5' },
  { key: 'ehrenamt', label: 'Ehrenamt', color: '#34d399' },
  { key: 'sport',    label: 'Sport',    color: '#fb923c' },
  { key: 'haushalt', label: 'Haushalt', color: '#94a3b8' },
];
const DAYS_SHORT = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const MAX_BOXES = 12;
const LS_KEY = 'aktivitaets_tracker_v1';

// GitHub config — stored in localStorage so the token never appears in the repo
const GH_OWNER = 'BoruFe511';
const GH_REPO  = 'aktivitaets-tracker';
const GH_FILE  = 'data.json';
const GH_TOKEN_KEY = 'gh_pat';

let state = {};
let weekStart = getMonday(new Date());
let syncTimer = null;
let ghSha = null; // current SHA of data.json on GitHub

// ── Helpers ──────────────────────────────────────────────────────────────────
function getMonday(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() - day + 1);
  return dt;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function todayStr() { return fmtDate(new Date()); }
function fmtWeek(mon) {
  const sun = addDays(mon, 6);
  const f = dt => `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}`;
  return `${f(mon)} – ${f(sun)}`;
}

// ── Local storage ─────────────────────────────────────────────────────────────
function localLoad() {
  try { const d = localStorage.getItem(LS_KEY); if (d) state = JSON.parse(d); } catch(e) {}
}
function localSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}
function getToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function saveToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

function getCount(cat, date) { return state[`${cat}__${date}`] || 0; }
function setCount(cat, date, n) {
  state[`${cat}__${date}`] = n;
  localSave();
  scheduleSyncUp();
}

// ── Sync status UI ────────────────────────────────────────────────────────────
function setSyncStatus(status, msg) {
  const dot = document.getElementById('sync-dot');
  const bar = document.getElementById('sync-bar');
  dot.className = 'sync-dot ' + (status || '');
  bar.textContent = msg || '';
}

// ── GitHub API ────────────────────────────────────────────────────────────────
const API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

async function ghGet() {
  const token = getToken();
  if (!token) return null;
  const r = await fetch(API, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return { notFound: true };
  if (!r.ok) throw new Error(`GitHub GET ${r.status}`);
  const json = await r.json();
  ghSha = json.sha;
  return JSON.parse(atob(json.content.replace(/\n/g,'')));
}

async function ghPut(data) {
  const token = getToken();
  if (!token) return;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: 'update tracker data', content };
  if (ghSha) body.sha = ghSha;
  const r = await fetch(API, {
    method: 'PUT',
    headers: {
      Authorization: `token ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.message || `GitHub PUT ${r.status}`);
  }
  const json = await r.json();
  ghSha = json.content.sha;
}

// ── Sync down (on load) ───────────────────────────────────────────────────────
async function syncDown() {
  if (!getToken()) return;
  setSyncStatus('syncing', 'Lade Daten …');
  try {
    const remote = await ghGet();
    if (remote && !remote.notFound) {
      // Merge: remote wins for keys not locally modified since last sync
      state = Object.assign({}, remote, state);
      // Simpler: just use remote as truth on load, local edits will overwrite
      state = remote;
      localSave();
      render();
    }
    setSyncStatus('ok', 'Synchronisiert ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Sync fehlgeschlagen: ' + e.message);
  }
}

// ── Sync up (debounced after edit) ────────────────────────────────────────────
function scheduleSyncUp() {
  clearTimeout(syncTimer);
  setSyncStatus('syncing', 'Speichere …');
  syncTimer = setTimeout(async () => {
    try {
      // Refresh SHA first to avoid conflicts
      if (!ghSha) await ghGet();
      await ghPut(state);
      setSyncStatus('ok', 'Gespeichert ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}));
    } catch(e) {
      if (e.message.includes('conflict') || e.message.includes('422')) {
        // SHA mismatch: pull latest then retry
        try {
          const remote = await ghGet();
          if (remote && !remote.notFound) state = Object.assign({}, remote, state);
          await ghPut(state);
          setSyncStatus('ok', 'Gespeichert (nach Konflikt)');
        } catch(e2) {
          setSyncStatus('err', 'Fehler: ' + e2.message);
        }
      } else {
        setSyncStatus('err', 'Fehler: ' + e.message);
      }
    }
  }, 1200);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const today = todayStr();
  const days = Array.from({length:7}, (_,i) => fmtDate(addDays(weekStart,i)));
  document.getElementById('week-str').textContent = fmtWeek(weekStart);

  const sumEl = document.getElementById('summary');
  let totalAll = 0;
  sumEl.innerHTML = CATS.map(c => {
    const t = days.reduce((s,d) => s + getCount(c.key,d), 0);
    totalAll += t;
    return `<div class="sum-card">
      <div class="sum-dot" style="background:${c.color}"></div>
      <div class="sum-val" style="color:${c.color}">${t}</div>
      <div class="sum-lbl">${c.label}</div>
    </div>`;
  }).join('');

  const grid = document.getElementById('days-grid');
  grid.innerHTML = days.map((d, di) => {
    const isToday = d === today;
    const ddStr = d.slice(8) + '.' + d.slice(5,7);
    const catCols = CATS.map(c => {
      const count = getCount(c.key, d);
      let boxes = '';
      for (let b = 0; b < MAX_BOXES; b++) {
        const filled = b < count;
        boxes += `<div class="box" data-cat="${c.key}" data-date="${d}" data-idx="${b}"
          style="${filled ? 'background:'+c.color+';border-color:transparent' : ''}"></div>`;
      }
      return `<div class="cat-section">${boxes}</div>`;
    }).join('<div class="cat-divider"></div>');

    return `<div class="day-col${isToday?' today':''}">
      <div class="day-hdr${isToday?' today':''}">
        ${DAYS_SHORT[di]}<span class="day-date">${ddStr}</span>
      </div>${catCols}
    </div>`;
  }).join('');

  const mins = totalAll * 10;
  document.getElementById('total-val').textContent = `${Math.floor(mins/60)}h ${mins%60}min`;

  grid.querySelectorAll('.box').forEach(box => {
    box.addEventListener('click', () => {
      const {cat, date, idx} = box.dataset;
      const i = parseInt(idx);
      const cur = getCount(cat, date);
      setCount(cat, date, i === cur-1 ? cur-1 : i+1);
      render();
    });
  });
}

// ── Token setup ───────────────────────────────────────────────────────────────
function checkToken() {
  if (!getToken()) {
    const t = prompt('GitHub Personal Access Token eingeben (wird nur lokal gespeichert):');
    if (t && t.trim()) saveToken(t.trim());
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
localLoad();
render();
checkToken();
syncDown();

document.getElementById('prev').onclick = () => { weekStart = addDays(weekStart,-7); render(); };
document.getElementById('next').onclick = () => { weekStart = addDays(weekStart,7); render(); };

// Sync down when tab becomes visible again (e.g. switching from phone to laptop)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) syncDown();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
